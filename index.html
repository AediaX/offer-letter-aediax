<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AediaX · Full‑Stack Internship Offer Letters</title>
    <link rel="icon" type="image/x-icon" href="https://www.aediax.com/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f7fa;
            color: #0b1c2e;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        .wrapper { min-height: 100vh; display: flex; flex-direction: column; }

        /* Navbar */
        .navbar-aediax {
            padding: 1rem 2rem;
            border-bottom: 1px solid #eef2f6;
            background: white;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-img { height: 40px; width: auto; }
        .company-tag { font-weight: 700; font-size: 1.2rem; letter-spacing: -0.02em; color: #0a2540; }
        .company-badge {
            background: #f1f5f9; color: #1e293b;
            padding: 0.2rem 0.8rem; border-radius: 40px;
            font-size: 0.75rem; font-weight: 500; border: 1px solid #e2e8f0;
        }

        /* Hero */
        .hero {
            background: linear-gradient(135deg, #0a2540 0%, #1e3a5f 100%);
            padding: 3rem 2rem 2.5rem;
            color: white;
        }
        .hero h1 { font-weight: 700; font-size: clamp(1.6rem, 4vw, 2.4rem); letter-spacing: -0.03em; margin-bottom: 0.5rem; }
        .hero .lead { font-size: 1.05rem; color: rgba(255,255,255,0.75); font-weight: 400; }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 0.5rem 1.2rem; border-radius: 40px;
            font-size: 0.85rem; font-weight: 500; margin-top: 1.2rem;
        }
        .status-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* Controls Bar */
        .controls-bar {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 1.2rem 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .search-wrap {
            position: relative;
            flex: 1;
            min-width: 200px;
            max-width: 380px;
        }
        .search-wrap i {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%); color: #94a3b8; font-size: 1rem;
        }
        .search-input {
            width: 100%; padding: 0.6rem 1rem 0.6rem 2.6rem;
            border: 1.5px solid #e2e8f0; border-radius: 40px;
            font-size: 0.9rem; background: #f8fafc; color: #0b1c2e;
            font-family: inherit; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.12); background: white; }
        .search-input::placeholder { color: #94a3b8; }

        .control-select {
            padding: 0.6rem 2rem 0.6rem 1rem;
            border: 1.5px solid #e2e8f0; border-radius: 40px;
            font-size: 0.85rem; font-family: inherit;
            background: #f8fafc url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M2 5l6 6 6-6'/%3e%3c/svg%3e") no-repeat right 12px center / 12px;
            appearance: none; cursor: pointer; color: #374151; outline: none;
            transition: border-color 0.2s;
        }
        .control-select:focus { border-color: #3b82f6; }

        .ctrl-label { font-size: 0.8rem; font-weight: 600; color: #64748b; letter-spacing: 0.04em; text-transform: uppercase; white-space: nowrap; }
        .results-info { margin-left: auto; font-size: 0.85rem; color: #64748b; white-space: nowrap; }

        /* PDF Grid Section */
        .pdf-section { flex: 1; padding: 2rem; }
        .pdf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.25rem;
        }
        .pdf-card {
            background: white;
            border: 1.5px solid #e6edf4;
            border-radius: 20px;
            padding: 1.4rem 1.2rem 1rem;
            display: flex;
            flex-direction: column;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
            cursor: default;
        }
        .pdf-card:hover {
            border-color: #3b82f6;
            box-shadow: 0 12px 24px -8px rgba(59,130,246,0.18);
            transform: translateY(-2px);
        }
        .card-icon { font-size: 2.4rem; color: #dc2626; margin-bottom: 0.9rem; line-height: 1; }
        .pdf-title { font-weight: 700; font-size: 1rem; margin-bottom: 0.3rem; line-height: 1.4; color: #0a2540; word-break: break-word; }
        .pdf-filename { font-size: 0.75rem; color: #94a3b8; margin-bottom: 0.9rem; font-family: monospace; word-break: break-all; }
        .pdf-meta-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 6px; margin-bottom: 1rem;
        }
        .meta-chip {
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px;
            padding: 0.35rem 0.6rem; font-size: 0.75rem; color: #475569;
            display: flex; align-items: center; gap: 5px;
        }
        .meta-chip i { color: #94a3b8; font-size: 0.8rem; }
        .meta-chip.date-chip { grid-column: 1 / -1; }
        .badge-new {
            display: inline-block; background: #dcfce7; color: #166534;
            border-radius: 40px; padding: 0.15rem 0.65rem; font-size: 0.7rem;
            font-weight: 600; margin-left: 6px; vertical-align: middle;
        }
        .download-btn {
            margin-top: auto;
            background: #0a2540; border: none;
            border-radius: 40px; padding: 0.6rem 1rem;
            font-weight: 600; font-size: 0.85rem; color: white;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; text-decoration: none; font-family: inherit;
            transition: background 0.15s, box-shadow 0.15s;
        }
        .download-btn:hover { background: #1a3a5c; box-shadow: 0 6px 14px -4px rgba(10,37,64,0.3); color: white; }

        /* Empty state */
        .empty-state {
            grid-column: 1 / -1; text-align: center;
            padding: 4rem 2rem; color: #64748b;
        }
        .empty-state i { font-size: 3rem; color: #cbd5e1; margin-bottom: 1rem; display: block; }

        /* Loading */
        .loading-state { grid-column: 1 / -1; text-align: center; padding: 4rem 2rem; color: #64748b; }
        .spinner-border { width: 2.5rem; height: 2.5rem; color: #0a2540; }

        /* Footer */
        .footer-bar {
            background: white; border-top: 1px solid #e2e8f0;
            padding: 1.4rem 2rem;
            font-size: 0.85rem; color: #64748b;
            display: flex; flex-wrap: wrap; align-items: center;
            justify-content: space-between; gap: 12px;
        }
        .footer-link { color: #0a2540; font-weight: 600; text-decoration: none; }
        .footer-link:hover { text-decoration: underline; }

        /* Skeleton */
        .skeleton-card {
            background: white; border: 1.5px solid #e6edf4;
            border-radius: 20px; padding: 1.4rem 1.2rem 1rem;
            display: flex; flex-direction: column; gap: 10px;
        }
        .skel { background: linear-gradient(90deg, #f0f4f8 25%, #e8edf3 50%, #f0f4f8 75%);
            background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar-aediax { padding: 0.85rem 1rem; }
            .hero { padding: 2rem 1rem 1.8rem; }
            .controls-bar { padding: 1rem; }
            .pdf-section { padding: 1.25rem 1rem; }
            .footer-bar { padding: 1rem; }
            .results-info { margin-left: 0; }
            .pdf-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
        }
        @media (max-width: 480px) {
            .hero h1 { font-size: 1.45rem; }
            .search-wrap { max-width: 100%; }
            .pdf-grid { grid-template-columns: 1fr; }
            .company-badge { display: none; }
        }
    </style>
</head>
<body>
<div class="wrapper">

    <!-- Navbar -->
    <nav class="navbar-aediax">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
            <div style="display:flex;align-items:center;gap:12px;">
                <img src="https://www.aediax.com/static/media/logo.fb254eb9a5d0c80f4f86.png" alt="AediaX Logo" class="logo-img">
                <span class="company-tag">AediaX</span>
                <span class="company-badge d-none d-sm-inline-flex align-items-center gap-1">
                    <i class="bi bi-building" style="font-size:0.75rem;"></i> Tech Private Limited
                </span>
            </div>
            <a href="https://www.aediax.com" target="_blank" rel="noopener"
               style="display:inline-flex;align-items:center;gap:8px;padding:0.45rem 1.1rem;border:1.5px solid #e2e8f0;border-radius:40px;font-size:0.85rem;font-weight:500;color:#0a2540;text-decoration:none;background:white;transition:background 0.15s,border-color 0.15s;"
               onmouseover="this.style.background='#f1f5f9';this.style.borderColor='#94a3b8';"
               onmouseout="this.style.background='white';this.style.borderColor='#e2e8f0';">
                <i class="bi bi-globe2"></i> aediax.com
            </a>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <div style="max-width:900px;">
            <h1>Full‑Stack Web Development Summer Internship 2026</h1>
            <p class="lead">Download your official offer letter to confirm your position at AediaX.</p>
            <div class="hero-badge">
                <span class="status-dot"></span>
                <span>Cohort starts May 2026</span>
            </div>
        </div>
    </section>

    <!-- Controls Bar -->
    <div class="controls-bar">
        <span class="ctrl-label d-none d-sm-inline">Filter</span>
        <div class="search-wrap">
            <i class="bi bi-search"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="Search by name…" autocomplete="off">
        </div>

        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span class="ctrl-label">Sort</span>
            <select class="control-select" id="sortSelect">
                <option value="name-asc">Name A → Z</option>
                <option value="name-desc">Name Z → A</option>
                <option value="date-desc">Newest first</option>
                <option value="date-asc">Oldest first</option>
                <option value="size-desc">Largest first</option>
                <option value="size-asc">Smallest first</option>
            </select>
        </div>

        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span class="ctrl-label d-none d-sm-inline">Date</span>
            <select class="control-select" id="dateFilter">
                <option value="all">All dates</option>
                <option value="last7">Last 7 days</option>
                <option value="last30">Last 30 days</option>
                <option value="last90">Last 90 days</option>
            </select>
        </div>

        <span class="results-info" id="resultsInfo"></span>
    </div>

    <!-- PDF Grid -->
    <section class="pdf-section">
        <div class="pdf-grid" id="pdfGridContainer">
            <!-- Skeleton placeholders -->
            <div class="skeleton-card">
                <div class="skel" style="width:48px;height:48px;border-radius:12px;"></div>
                <div class="skel" style="height:18px;width:80%;"></div>
                <div class="skel" style="height:12px;width:60%;"></div>
                <div class="skel" style="height:40px;border-radius:40px;margin-top:8px;"></div>
            </div>
            <div class="skeleton-card">
                <div class="skel" style="width:48px;height:48px;border-radius:12px;"></div>
                <div class="skel" style="height:18px;width:70%;"></div>
                <div class="skel" style="height:12px;width:50%;"></div>
                <div class="skel" style="height:40px;border-radius:40px;margin-top:8px;"></div>
            </div>
            <div class="skeleton-card">
                <div class="skel" style="width:48px;height:48px;border-radius:12px;"></div>
                <div class="skel" style="height:18px;width:75%;"></div>
                <div class="skel" style="height:12px;width:55%;"></div>
                <div class="skel" style="height:40px;border-radius:40px;margin-top:8px;"></div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer-bar">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <i class="bi bi-github"></i>
            <span>Sourced from</span>
            <a href="https://github.com/AediaX/offer-letter-aediax" target="_blank" class="footer-link">
                AediaX/offer-letter-aediax <i class="bi bi-box-arrow-up-right" style="font-size:0.75rem;"></i>
            </a>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
            <i class="bi bi-shield-check text-success"></i>
            <span>Digitally signed &nbsp;·&nbsp; <span id="liveCount">—</span> offer letters</span>
        </div>
    </footer>
</div>

<script>
(function () {
    'use strict';

    const REPO_OWNER = 'AediaX';
    const REPO_NAME  = 'offer-letter-aediax';
    const BRANCH     = 'main';
    const API_URL    = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents?ref=${BRANCH}`;
    const COMMITS_API = (filename) =>
        `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/commits?path=${encodeURIComponent(filename)}&sha=${BRANCH}&per_page=1`;
    const RAW_BASE   = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/`;

    const grid        = document.getElementById('pdfGridContainer');
    const searchInput = document.getElementById('searchInput');
    const sortSelect  = document.getElementById('sortSelect');
    const dateFilter  = document.getElementById('dateFilter');
    const resultsInfo = document.getElementById('resultsInfo');
    const liveCount   = document.getElementById('liveCount');

    let allItems = [];
    const nowMs = Date.now();

    function formatBytes(bytes) {
        if (!bytes || bytes === 0) return '—';
        const k = 1024, sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function formatDate(isoString) {
        if (!isoString) return 'Unknown';
        const d = new Date(isoString);
        return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function isNew(isoString) {
        if (!isoString) return false;
        return (nowMs - new Date(isoString).getTime()) < 7 * 24 * 3600 * 1000;
    }

    function displayName(filename) {
        return filename
            .replace(/\.pdf$/i, '')
            .replace(/-Offer\s*Letter$/i, '')
            .trim();
    }

    // Fetch individual file commit date
    async function fetchCommitDate(filename) {
        try {
            const r = await fetch(COMMITS_API(filename));
            if (!r.ok) return null;
            const data = await r.json();
            if (data.length > 0 && data[0].commit && data[0].commit.committer) {
                return data[0].commit.committer.date;
            }
        } catch (_) {}
        return null;
    }

    function applyFiltersAndRender() {
        const q = searchInput.value.trim().toLowerCase();
        const sort = sortSelect.value;
        const dateRange = dateFilter.value;

        let filtered = allItems.filter(item => {
            // Search filter
            if (q && !item.name.toLowerCase().includes(q) && !displayName(item.name).toLowerCase().includes(q)) return false;
            // Date filter
            if (dateRange !== 'all' && item.uploadedDate) {
                const ageMs = nowMs - new Date(item.uploadedDate).getTime();
                const days = { 'last7': 7, 'last30': 30, 'last90': 90 }[dateRange];
                if (ageMs > days * 24 * 3600 * 1000) return false;
            }
            return true;
        });

        // Sort
        filtered.sort((a, b) => {
            switch (sort) {
                case 'name-asc':  return a.name.localeCompare(b.name);
                case 'name-desc': return b.name.localeCompare(a.name);
                case 'date-desc': return (new Date(b.uploadedDate || 0)) - (new Date(a.uploadedDate || 0));
                case 'date-asc':  return (new Date(a.uploadedDate || 0)) - (new Date(b.uploadedDate || 0));
                case 'size-desc': return (b.size || 0) - (a.size || 0);
                case 'size-asc':  return (a.size || 0) - (b.size || 0);
                default: return 0;
            }
        });

        resultsInfo.textContent = filtered.length + ' of ' + allItems.length + ' letters';
        renderCards(filtered);
    }

    function renderCards(items) {
        grid.innerHTML = '';
        if (items.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <i class="bi bi-search"></i>
                    <p style="font-size:1.1rem;font-weight:600;color:#374151;margin-bottom:0.5rem;">No letters found</p>
                    <p style="font-size:0.9rem;">Try a different name or adjust the filters.</p>
                </div>`;
            return;
        }

        items.forEach(item => {
            const rawUrl     = item.download_url || (RAW_BASE + encodeURIComponent(item.name));
            const fileSize   = formatBytes(item.size);
            const uploadedAt = formatDate(item.uploadedDate);
            const fresh      = isNew(item.uploadedDate);
            const name       = displayName(item.name);

            const card = document.createElement('div');
            card.className = 'pdf-card';
            card.innerHTML = `
                <div class="card-icon"><i class="bi bi-file-pdf-fill"></i></div>
                <div class="pdf-title">
                    ${name}
                    ${fresh ? '<span class="badge-new">New</span>' : ''}
                </div>
                <div class="pdf-filename">${item.name}</div>
                <div class="pdf-meta-grid">
                    <div class="meta-chip">
                        <i class="bi bi-hdd-stack"></i>
                        <span>${fileSize}</span>
                    </div>
                    <div class="meta-chip" id="date-${item.name.replace(/[^a-z0-9]/gi, '_')}">
                        <i class="bi bi-clock"></i>
                        <span>Loading…</span>
                    </div>
                    <div class="meta-chip date-chip">
                        <i class="bi bi-calendar3"></i>
                        <span>Uploaded: ${uploadedAt}</span>
                    </div>
                </div>
                <a href="${rawUrl}" download="${item.name}" class="download-btn" aria-label="Download ${item.name}">
                    <i class="bi bi-download"></i> Download PDF
                </a>`;

            // Once date is known, update the date chip too
            if (item.uploadedDate) {
                const timeAgo = getTimeAgo(item.uploadedDate);
                const chip = card.querySelector(`#date-${item.name.replace(/[^a-z0-9]/gi, '_')}`);
                if (chip) chip.innerHTML = `<i class="bi bi-clock"></i><span>${timeAgo}</span>`;
            }

            grid.appendChild(card);
        });
    }

    function getTimeAgo(isoString) {
        if (!isoString) return '—';
        const diffMs  = Date.now() - new Date(isoString).getTime();
        const days    = Math.floor(diffMs / (1000 * 60 * 60 * 24));
        if (days === 0) return 'Today';
        if (days === 1) return 'Yesterday';
        if (days < 7)  return days + ' days ago';
        if (days < 30) return Math.floor(days / 7) + ' wk ago';
        if (days < 365) return Math.floor(days / 30) + ' mo ago';
        return Math.floor(days / 365) + ' yr ago';
    }

    // Fetch all PDFs, then fetch commit dates in parallel
    async function fetchPdfFiles() {
        try {
            const r = await fetch(API_URL);
            if (!r.ok) throw new Error('Status ' + r.status);
            const data = await r.json();
            const pdfs = data.filter(item => item.type === 'file' && item.name.toLowerCase().endsWith('.pdf'));

            if (pdfs.length === 0) {
                grid.innerHTML = `<div class="empty-state"><i class="bi bi-inbox"></i><p>No offer letters found. Please refresh later.</p></div>`;
                return;
            }

            // Show initial render with size, no dates yet
            allItems = pdfs.map(p => ({ ...p, uploadedDate: null }));
            liveCount.textContent = allItems.length;
            applyFiltersAndRender();

            // Fetch commit dates in parallel (batched to avoid rate-limiting)
            const batchSize = 5;
            for (let i = 0; i < allItems.length; i += batchSize) {
                const batch = allItems.slice(i, i + batchSize);
                await Promise.all(batch.map(async (item) => {
                    const date = await fetchCommitDate(item.name);
                    item.uploadedDate = date;
                }));
                applyFiltersAndRender(); // re-render with dates as they come in
            }

        } catch (err) {
            console.error('GitHub API error:', err);
            fallbackStaticList();
        }
    }

    function fallbackStaticList() {
        const staticFiles = [
            "Anubhab-Offer Letter.pdf", "Deepak-Offer Letter.pdf", "Khageswar-Offer Letter.pdf",
            "Mehroz-Offer Letter.pdf", "Preeti Sudha-Offer Letter.pdf", "Sagarika-Offer Letter.pdf",
            "Sambit-Sourav-Offer Letter.pdf", "Sidhartha-Offer Letter.pdf", "Sima-Offer Letter.pdf",
            "Sneha-Offer Letter.pdf", "Sohan-Offer Letter.pdf", "Subham-Offer Letter.pdf",
            "Tanmay-Offer Letter.pdf", "Tishika-Offer Letter.pdf"
        ];
        allItems = staticFiles.map(name => ({
            name, download_url: RAW_BASE + encodeURIComponent(name),
            size: null, uploadedDate: '2026-04-16T00:00:00Z'
        }));
        liveCount.textContent = allItems.length;
        applyFiltersAndRender();

        const note = document.createElement('div');
        note.style.cssText = 'grid-column:1/-1;padding:0.8rem 1rem;background:#fef9c3;border:1px solid #fde047;border-radius:12px;font-size:0.85rem;color:#713f12;display:flex;align-items:center;gap:8px;';
        note.innerHTML = '<i class="bi bi-info-circle" style="font-size:1rem;"></i> Displaying from local cache (GitHub API limit). All dates show April 16, 2026.';
        grid.prepend(note);
    }

    // Debounced search
    let debounceTimer;
    searchInput.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(applyFiltersAndRender, 200);
    });
    sortSelect.addEventListener('change', applyFiltersAndRender);
    dateFilter.addEventListener('change', applyFiltersAndRender);

    fetchPdfFiles();
})();
